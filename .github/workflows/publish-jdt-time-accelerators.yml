name: Publish JDT Time Accelerators

on:
  workflow_dispatch:
    inputs:
      version:
        description: JDT Time Accelerators release version
        required: true
        default: 1.2.0
        type: string

concurrency:
  group: jdt-time-accelerators-cross-repo-release
  cancel-in-progress: false

jobs:
  build:
    name: Build JDT ${{ matrix.branch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - branch: '1.21.1'
            java: 21
            archive: jdttimeaccelerators-neoforge-1.21.1
          - branch: '26.1.2'
            java: 25
            archive: jdttimeaccelerators-neoforge-26.1.2
    steps:
      - name: Checkout JDT Time Accelerators ${{ matrix.branch }}
        uses: actions/checkout@v4
        with:
          repository: Uncraftbar/jdttimeaccelerators
          ref: ${{ matrix.branch }}
      - name: Set up compile toolchain
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}
      - name: Set up Java 21 for Gradle
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
      - name: Verify version
        shell: bash
        run: test "$(sed -n 's/^mod_version=//p' gradle.properties)" = "${{ inputs.version }}"
      - name: Build
        run: ./gradlew --no-daemon clean build
      - name: Collect jar
        shell: bash
        run: |
          jar="build/libs/${{ matrix.archive }}-${{ inputs.version }}.jar"
          test -f "$jar"
          mkdir release-artifact
          cp "$jar" release-artifact/
      - uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.archive }}
          path: release-artifact/*.jar
          if-no-files-found: error

  publish:
    name: Publish JDT ${{ inputs.version }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout JDT release configuration
        uses: actions/checkout@v4
        with:
          repository: Uncraftbar/jdttimeaccelerators
          ref: '1.21.1'
          path: jdt
      - name: Download jars
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          path: jdt/release/artifacts
          merge-multiple: true
      - name: Verify release set
        shell: bash
        run: |
          find jdt/release/artifacts -maxdepth 1 -type f -name '*.jar' -print | sort
          test "$(find jdt/release/artifacts -maxdepth 1 -type f -name '*.jar' | wc -l)" -eq 2
      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
      - name: Publish to Modrinth and CurseForge
        env:
          MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
          CURSEFORGE_TOKEN: ${{ secrets.CURSEFORGE_TOKEN }}
        run: |
          ./jdt/release/gradlew -p jdt/release --no-daemon publishMods \
            -PreleaseVersion="${{ inputs.version }}" \
            -PdryRun=false
