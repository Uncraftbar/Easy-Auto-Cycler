modLoader="javafml"
loaderVersion="${loader_version_range}"
license="${mod_license}"

[[mods]]
modId="${mod_id}"
version="${mod_version}"
displayName="${mod_name}"
authors="${mod_authors}"
description='''${mod_description}'''

[[dependencies.${mod_id}]]
    modId="neoforge"
    type="required"
    versionRange="${neo_version_range}"
    ordering="NONE"
    side="BOTH"

[[dependencies.${mod_id}]]
    modId="minecraft"
    type="required"
    versionRange="${minecraft_version_range}"
    ordering="NONE"
    side="BOTH"

[[dependencies.${mod_id}]]
    modId="easy_villagers"
    type="optional"
    versionRange="[1.1.41,)"
    ordering="AFTER"
    side="BOTH"

[[dependencies.${mod_id}]]
    modId="trade_cycling"
    type="optional"
    versionRange="[1.0.20,)"
    ordering="AFTER"
    side="BOTH"
