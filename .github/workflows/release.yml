name: Publish release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Version shared by every release branch
        required: true
        default: 3.1.0
        type: string
      publish:
        description: Upload to Modrinth and CurseForge (disabled means dry run)
        required: true
        default: false
        type: boolean
      destination:
        description: Destinations to validate or publish
        required: true
        default: all
        type: choice
        options:
          - all
          - modrinth
          - curseforge

permissions:
  contents: read

concurrency:
  group: easy-auto-cycler-release
  cancel-in-progress: false

jobs:
  build:
    name: Build ${{ matrix.branch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - branch: fabric-1.20.1
            java: 17
            archive: easyautocycler-fabric-1.20.1
          - branch: forge-1.20.1
            java: 17
            archive: easyautocycler-forge-1.20.1
          - branch: fabric-1.21.1
            java: 21
            archive: easyautocycler-fabric-1.21.1
          - branch: neoforge-1.21.1
            java: 21
            archive: easyautocycler-neoforge-1.21.1
          - branch: fabric-1.21.11
            java: 21
            archive: easyautocycler-fabric-1.21.11
          - branch: neoforge-1.21.11
            java: 21
            archive: easyautocycler-neoforge-1.21.11
          - branch: fabric-26.1.2
            java: 25
            archive: easyautocycler-fabric-26.1.2
          - branch: neoforge-26.1.2
            java: 25
            archive: easyautocycler-neoforge-26.1.2
          - branch: fabric-26.2
            java: 25
            archive: easyautocycler-fabric-26.2
          - branch: neoforge-26.2
            java: 25
            archive: easyautocycler-neoforge-26.2

    steps:
      - name: Checkout ${{ matrix.branch }}
        uses: actions/checkout@v4
        with:
          ref: ${{ matrix.branch }}

      - name: Set up Java ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Verify branch version
        shell: bash
        run: |
          actual_version="$(sed -n 's/^mod_version=//p' gradle.properties)"
          if [[ "$actual_version" != "${{ inputs.version }}" ]]; then
            echo "${{ matrix.branch }} declares $actual_version, expected ${{ inputs.version }}" >&2
            exit 1
          fi

      - name: Build jar
        run: ./gradlew --no-daemon build

      - name: Collect release jar
        shell: bash
        run: |
          jar="build/libs/${{ matrix.archive }}-${{ inputs.version }}.jar"
          test -f "$jar"
          mkdir -p release-artifact
          cp "$jar" release-artifact/

      - name: Upload release jar
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.archive }}
          path: release-artifact/*.jar
          if-no-files-found: error

  publish:
    name: ${{ inputs.publish && 'Publish' || 'Dry run' }} ${{ inputs.version }}
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout release configuration
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Download all release jars
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          path: release/artifacts
          merge-multiple: true

      - name: Verify release set
        shell: bash
        run: |
          find release/artifacts -maxdepth 1 -type f -name '*.jar' -print | sort
          count="$(find release/artifacts -maxdepth 1 -type f -name '*.jar' | wc -l)"
          test "$count" -eq 10

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run publisher
        shell: bash
        env:
          MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
          CURSEFORGE_TOKEN: ${{ secrets.CURSEFORGE_TOKEN }}
        run: |
          dry_run=true
          if [[ "${{ inputs.publish }}" == "true" ]]; then
            dry_run=false
          fi
          publish_task=publishMods
          if [[ "${{ inputs.destination }}" == "modrinth" ]]; then
            publish_task=publishModrinthAll
          elif [[ "${{ inputs.destination }}" == "curseforge" ]]; then
            publish_task=publishCurseforgeAll
          fi
          ./release/gradlew -p release --no-daemon "$publish_task" \
            -PreleaseVersion="${{ inputs.version }}" \
            -PdryRun="$dry_run"

      - name: Upload dry-run output
        if: ${{ ! inputs.publish }}
        uses: actions/upload-artifact@v4
        with:
          name: publish-dry-run-${{ inputs.version }}
          path: release/build
          if-no-files-found: error
